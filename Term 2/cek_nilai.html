<!DOCTYPE html>
<html>
<head>
  <title>Cek Nilai</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 250px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input:focus {
      outline: none;
      border: 1px solid #4facfe;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #4facfe;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #007bff;
    }

    #hasil {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Cek Nilai</h2>

    <input type="number" id="nilai" placeholder="Masukkan nilai">

    <button id="cek">Cek</button>

    <h3 id="hasil"></h3>
  </div>

  <script>
    let tombol = document.getElementById("cek");
    let hasil = document.getElementById("hasil");

    tombol.onclick = function () {
      let n = document.getElementById("nilai").value;

      if (n === "") {
        hasil.innerText = "Masukkan nilai dulu!";
        hasil.style.color = "orange";
      } 
      else if (n >= 90) {
        hasil.innerText = "Grade A - Lulus";
        hasil.style.color = "green";
      } 
      else if (n >= 75) {
        hasil.innerText = "Grade B - Lulus";
        hasil.style.color = "green";
      } 
      else if (n >= 60) {
        hasil.innerText = "Grade C - Lulus";
        hasil.style.color = "blue";
      } 
      else {
        hasil.innerText = "Grade D - Tidak Lulus";
        hasil.style.color = "red";
      }
    };
  </script>

</body>
</html>
